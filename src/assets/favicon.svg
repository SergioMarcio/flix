<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clapper board body -->
  <rect x="10" y="30" width="60" height="55" rx="4" ry="4" fill="#2c3e50"/>
  <rect x="10" y="45" width="60" height="4" fill="#ecf0f1"/>
  <rect x="10" y="57" width="60" height="4" fill="#ecf0f1"/>
  <rect x="10" y="69" width="60" height="4" fill="#ecf0f1"/>

  <!-- Clapper top (stripes) -->
  <rect x="10" y="18" width="60" height="14" rx="2" ry="2" fill="#ecf0f1"/>
  <polygon points="10,18 25,18 18,32 10,32" fill="#2c3e50"/>
  <polygon points="25,18 40,18 33,32 18,32" fill="#ecf0f1"/>
  <polygon points="40,18 55,18 48,32 33,32" fill="#2c3e50"/>
  <polygon points="55,18 70,18 63,32 48,32" fill="#ecf0f1"/>

  <!-- Popcorn bucket -->
  <polygon points="52,42 80,42 76,88 56,88" fill="#e74c3c"/>
  <rect x="52" y="42" width="28" height="8" fill="#c0392b"/>
  <!-- Stripes -->
  <polygon points="57,42 63,42 59,88 53,88" fill="#fff" opacity="0.9"/>
  <polygon points="68,42 74,42 70,88 64,88" fill="#fff" opacity="0.9"/>

  <!-- Popcorn pieces -->
  <ellipse cx="60" cy="40" rx="6" ry="5" fill="#f1c40f"/>
  <ellipse cx="72" cy="38" rx="5" ry="5" fill="#f39c12"/>
  <ellipse cx="66" cy="34" rx="6" ry="5" fill="#f1c40f"/>
  <ellipse cx="55" cy="36" rx="5" ry="4" fill="#f39c12"/>
  <ellipse cx="78" cy="40" rx="4" ry="4" fill="#f1c40f"/>
  <ellipse cx="60" cy="30" rx="5" ry="4" fill="#f1c40f"/>
  <ellipse cx="72" cy="30" rx="5" ry="4" fill="#f39c12"/>
</svg>
